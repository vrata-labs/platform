<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noah Remote Browser Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 48px; color: #111827; background: #f8fafc; }
      main { max-width: 760px; padding: 32px; background: white; border: 1px solid #cbd5e1; border-radius: 18px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12); }
      button, input { font: inherit; padding: 12px 16px; border-radius: 10px; border: 1px solid #94a3b8; }
      button { color: white; background: #2563eb; border-color: #2563eb; cursor: pointer; }
      .row { display: flex; gap: 12px; align-items: center; margin-top: 20px; }
      #counter { font-weight: 700; color: #2563eb; }
      #text-value { font-weight: 700; color: #dc2626; }
    </style>
  </head>
  <body>
    <main>
      <h1>Remote Browser Demo</h1>
      <p>This page is intentionally controlled by the NOAH remote browser executor.</p>
      <div class="row">
        <button id="increment">Increment</button>
        <span>Counter: <span id="counter">0</span></span>
      </div>
      <div class="row">
        <label for="remote-input">Input</label>
        <input id="remote-input" value="" placeholder="type here" />
        <span>Value: <span id="text-value">empty</span></span>
      </div>
      <div style="height: 900px"></div>
      <p id="scroll-target">Scroll target reached</p>
    </main>
    <script>
      const counter = document.querySelector('#counter');
      const input = document.querySelector('#remote-input');
      const value = document.querySelector('#text-value');
      document.querySelector('#increment').addEventListener('click', () => {
        counter.textContent = String(Number(counter.textContent || '0') + 1);
      });
      input.addEventListener('input', () => {
        value.textContent = input.value || 'empty';
      });
    </script>
  </body>
</html>
