<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noah Control Plane</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>Noah Control Plane</h1>
        <form id="room-form">
          <label>Admin token <input id="admin-token-input" type="password" placeholder="required on secured env" /></label>
          <label>Tenant <select id="tenant-select"></select></label>
          <label>Room name <input id="room-name-input" value="Showroom Demo" /></label>
          <label>Template <select id="template-select"></select></label>
          <label>Attach assets <select id="asset-select" multiple></select></label>
          <label>Registered scene bundle <select id="scene-bundle-select"></select></label>
          <label>Bundle version <select id="scene-bundle-version-select"></select></label>
          <label>Primary color <input id="primary-color-input" type="color" value="#5fc8ff" /></label>
          <label>Accent color <input id="accent-color-input" type="color" value="#163354" /></label>
          <label><input id="feature-voice-input" type="checkbox" checked /> Voice</label>
          <label><input id="feature-spatial-input" type="checkbox" checked /> Spatial audio</label>
          <label><input id="feature-share-input" type="checkbox" checked /> Screen share</label>
          <label><input id="guest-access-input" type="checkbox" checked /> Guest access</label>
          <label><input id="avatar-enabled-input" type="checkbox" /> Avatars enabled</label>
          <label>Avatar catalog URL <input id="avatar-catalog-url-input" value="/assets/avatars/catalog.v1.json" /></label>
          <label>Avatar quality <select id="avatar-quality-select">
            <option value="desktop-standard">desktop-standard</option>
            <option value="mobile-lite">mobile-lite</option>
            <option value="xr">xr</option>
          </select></label>
          <label><input id="avatar-fallback-input" type="checkbox" checked /> Capsule fallback enabled</label>
          <label><input id="avatar-seats-input" type="checkbox" /> Avatar seats enabled</label>
          <button id="create-room" type="submit">Create room</button>
          <button id="update-room" type="button">Update selected room</button>
          <button id="bind-scene-bundle" type="button">Bind selected scene bundle</button>
          <button id="set-current-scene-bundle" type="button">Set version current</button>
          <button id="mark-scene-bundle-obsolete" type="button">Mark version obsolete</button>
          <button id="delete-room" type="button">Delete selected room</button>
        </form>
        <form id="scene-bundle-form">
          <label>Bundle id <input id="scene-bundle-id-input" value="sense-demo" /></label>
          <label>Version <input id="scene-bundle-version-input" value="v1" /></label>
          <label>Storage key <input id="scene-bundle-storage-key-input" value="scenes/sense-demo/v1/scene.json" /></label>
          <button id="create-scene-bundle-version" type="submit">Add bundle version</button>
        </form>
        <form id="asset-form">
          <label>Asset kind <input id="asset-kind-input" value="logo" /></label>
          <label>Asset URL <input id="asset-url-input" value="https://example.com/logo.png" /></label>
          <label>Processed asset URL <input id="asset-processed-url-input" value="https://cdn.example.com/logo.glb" /></label>
          <label>Asset status <select id="asset-status-select">
            <option value="validated">validated</option>
            <option value="pending">pending</option>
            <option value="rejected">rejected</option>
          </select></label>
          <button id="create-asset" type="submit">Add asset metadata</button>
          <button id="update-asset" type="button">Update selected asset</button>
          <button id="delete-asset" type="button">Delete selected asset</button>
        </form>
        <form id="tenant-form">
          <label>Tenant name <input id="tenant-name-input" value="Acme Tenant" /></label>
          <button id="create-tenant" type="submit">Add tenant</button>
          <button id="update-tenant" type="button">Update selected tenant</button>
          <button id="delete-tenant" type="button">Delete selected tenant</button>
        </form>
        <div id="publish-status">idle</div>
        <a id="room-link" target="_blank" rel="noreferrer"></a>
        <button id="refresh-room-detail" type="button">Refresh room detail</button>
        <pre id="template-detail">Select a template to inspect details</pre>
        <label>Filter rooms by tenant <select id="room-filter-tenant"></select></label>
        <ul id="rooms-list"></ul>
        <pre id="room-detail">Select a room to inspect details</pre>
        <ul id="tenants-list"></ul>
        <ul id="assets-list"></ul>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
