services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    environment:
      UDP_PORT: 7881
      NODE_IP: ${LIVEKIT_NODE_IP}
    ports:
      - "${NOAH_LIVEKIT_PORT}:7880"
      - "${NOAH_LIVEKIT_UDP_PORT}:7881/udp"

  room-state:
    image: ${ROOM_STATE_IMAGE_REPO}:${IMAGE_TAG}
    build:
      context: ../..
      dockerfile: apps/room-state/Dockerfile
    environment:
      NODE_ENV: production
      ROOM_STATE_PORT: 2567
      STATE_TOKEN_SECRET: ${STATE_TOKEN_SECRET:-dev-state-secret}
      NOAH_INTERNAL_SERVICE_TOKEN: ${NOAH_INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      NOAH_DEV_ROLE_QUERY: ${NOAH_DEV_ROLE_QUERY:-true}
      REMOTE_BROWSER_INTERNAL_URL: http://remote-browser:4010
    ports:
      - "${NOAH_ROOM_STATE_PORT}:2567"

  remote-browser:
    image: ${REMOTE_BROWSER_IMAGE_REPO}:${IMAGE_TAG}
    build:
      context: ../..
      dockerfile: apps/remote-browser/Dockerfile
    environment:
      NODE_ENV: production
      REMOTE_BROWSER_PORT: 4010
      REMOTE_BROWSER_TOKEN_SECRET: ${REMOTE_BROWSER_TOKEN_SECRET:-dev-remote-browser-secret}
      NOAH_INTERNAL_SERVICE_TOKEN: ${NOAH_INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      API_INTERNAL_URL: http://api:4000
      ROOM_STATE_INTERNAL_URL: http://room-state:2567
      REMOTE_BROWSER_ALLOWED_ORIGINS: ${REMOTE_BROWSER_ALLOWED_ORIGINS}
      REMOTE_BROWSER_ALLOW_PRIVATE_ALLOWED_ORIGINS: ${REMOTE_BROWSER_ALLOW_PRIVATE_ALLOWED_ORIGINS:-false}
      REMOTE_BROWSER_FRAME_INTERVAL_MS: ${REMOTE_BROWSER_FRAME_INTERVAL_MS:-250}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4010/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SCENE_PREFIX: ${MINIO_SCENE_PREFIX}
    volumes:
      - ./minio-bootstrap.sh:/bootstrap.sh:ro
      - ./minio-scene-smoke.json:/seed/scene.json:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"

  api:
    image: ${API_IMAGE_REPO}:${IMAGE_TAG}
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      room-state:
        condition: service_started
      remote-browser:
        condition: service_healthy
      livekit:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN}
      API_PUBLIC_URL: ${NOAH_APP_BASE_URL}
      RUNTIME_BASE_URL: ${NOAH_APP_BASE_URL}
      ROOM_STATE_PUBLIC_URL: ${ROOM_STATE_PUBLIC_URL}
      LIVEKIT_URL: ${LIVEKIT_URL}
      NOAH_LIVEKIT_DOMAIN: ${NOAH_LIVEKIT_DOMAIN}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_ROOM_PREFIX: ${LIVEKIT_ROOM_PREFIX}
      CONTROL_PLANE_ADMIN_TOKEN: ${CONTROL_PLANE_ADMIN_TOKEN}
      STATE_TOKEN_TTL_SECONDS: ${STATE_TOKEN_TTL_SECONDS}
      STATE_TOKEN_SECRET: ${STATE_TOKEN_SECRET:-dev-state-secret}
      REMOTE_BROWSER_TOKEN_SECRET: ${REMOTE_BROWSER_TOKEN_SECRET:-dev-remote-browser-secret}
      NOAH_INTERNAL_SERVICE_TOKEN: ${NOAH_INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
      REMOTE_BROWSER_TOKEN_TTL_SECONDS: ${REMOTE_BROWSER_TOKEN_TTL_SECONDS:-300}
      REMOTE_BROWSER_PUBLIC_URL: ${REMOTE_BROWSER_PUBLIC_URL}
      MEDIA_TOKEN_TTL_SECONDS: ${MEDIA_TOKEN_TTL_SECONDS}
      NOAH_DEV_ROLE_QUERY: ${NOAH_DEV_ROLE_QUERY:-true}
      POSTGRES_URL: ${POSTGRES_URL}
      SCENE_BUNDLE_PROVIDER: ${SCENE_BUNDLE_PROVIDER:-minio-default}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}
      SCENE_BUNDLE_S3_ENDPOINT: ${SCENE_BUNDLE_S3_ENDPOINT:-}
      SCENE_BUNDLE_S3_REGION: ${SCENE_BUNDLE_S3_REGION:-}
      SCENE_BUNDLE_S3_BUCKET: ${SCENE_BUNDLE_S3_BUCKET:-}
      SCENE_BUNDLE_S3_PUBLIC_BASE_URL: ${SCENE_BUNDLE_S3_PUBLIC_BASE_URL:-}
      FEATURE_AVATAR_POSE_BINARY: ${FEATURE_AVATAR_POSE_BINARY:-true}
    ports:
      - "${NOAH_API_DIRECT_PORT}:4000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      api:
        condition: service_healthy
      remote-browser:
        condition: service_healthy
    ports:
      - "${NOAH_HTTP_PORT}:80"
      - "${NOAH_HTTPS_PORT}:443"
    environment:
      NOAH_APP_DOMAIN: ${NOAH_APP_DOMAIN}
      NOAH_STATE_DOMAIN: ${NOAH_STATE_DOMAIN}
      NOAH_LIVEKIT_DOMAIN: ${NOAH_LIVEKIT_DOMAIN}
      NOAH_BROWSER_DOMAIN: ${NOAH_BROWSER_DOMAIN}
    volumes:
      - ${CADDY_CONFIG_FILE}:/etc/caddy/Caddyfile:ro
      - ../../apps/runtime-web/public:/srv/runtime-public:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
