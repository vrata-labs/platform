#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - curl
  - caddy

write_files:
  - path: /etc/systemd/system/livekit.service
    permissions: "0644"
    content: |
      [Unit]
      Description=LiveKit staging service
      After=network.target

      [Service]
      Type=simple
      Restart=always
      RestartSec=5
      ExecStart=/usr/local/bin/livekit-server --dev --bind 0.0.0.0

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/noah-api.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Noah API staging service
      After=network.target livekit.service
      Requires=livekit.service

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/noah
      EnvironmentFile=/etc/default/noah-staging
      Environment=NODE_ENV=production
      Environment=API_PORT=4000
      Environment=API_CORS_ORIGIN=*
      Environment=LIVEKIT_API_KEY=devkey
      Environment=LIVEKIT_API_SECRET=secret
      Environment=LIVEKIT_ROOM_PREFIX=noah-
      Environment=STATE_TOKEN_TTL_SECONDS=900
      Environment=MEDIA_TOKEN_TTL_SECONDS=900
      ExecStart=/usr/bin/node /opt/noah/apps/api/dist/index.js
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -sSL https://get.livekit.io | bash
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - export NOAH_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
  - export NOAH_APP_DOMAIN=${NOAH_IP}.sslip.io
  - export NOAH_LIVEKIT_DOMAIN=livekit.${NOAH_IP}.sslip.io
  - printf 'NOAH_APP_DOMAIN=%s
NOAH_LIVEKIT_DOMAIN=%s
RUNTIME_BASE_URL=https://%s
LIVEKIT_URL=wss://%s
' "$NOAH_APP_DOMAIN" "$NOAH_LIVEKIT_DOMAIN" "$NOAH_APP_DOMAIN" "$NOAH_LIVEKIT_DOMAIN" >/etc/default/noah-staging
  - bash -lc 'source /etc/default/noah-staging && cat > /etc/caddy/Caddyfile <<EOF
${NOAH_APP_DOMAIN} {
  reverse_proxy 127.0.0.1:4000
}

${NOAH_LIVEKIT_DOMAIN} {
  reverse_proxy 127.0.0.1:7880
}
EOF'
  - corepack enable
  - rm -rf /opt/noah
  - git clone https://github.com/psilon2000/noah.git /opt/noah
  - bash -lc 'cd /opt/noah && pnpm install --no-frozen-lockfile'
  - bash -lc 'cd /opt/noah && pnpm build'
  - systemctl daemon-reload
  - systemctl enable livekit.service
  - systemctl restart livekit.service
  - systemctl enable noah-api.service
  - systemctl restart noah-api.service
  - systemctl enable caddy
  - systemctl restart caddy
