#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - curl
  - postgresql

write_files:
  - path: /usr/local/bin/noah-write-domains.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      NOAH_IP="51.250.19.248"
      NOAH_DOMAIN_PREFIX="$(hostname -s)"
      NOAH_APP_DOMAIN="$${NOAH_DOMAIN_PREFIX}.$${NOAH_IP}.sslip.io"
      NOAH_LIVEKIT_DOMAIN="livekit-$${NOAH_DOMAIN_PREFIX}.$${NOAH_IP}.sslip.io"
      NOAH_STATE_DOMAIN="state-$${NOAH_DOMAIN_PREFIX}.$${NOAH_IP}.sslip.io"

      printf '%s\n' \
        "NOAH_APP_DOMAIN=$${NOAH_APP_DOMAIN}" \
        "NOAH_LIVEKIT_DOMAIN=$${NOAH_LIVEKIT_DOMAIN}" \
        "NOAH_STATE_DOMAIN=$${NOAH_STATE_DOMAIN}" \
        "RUNTIME_BASE_URL=https://$${NOAH_APP_DOMAIN}" \
        "API_PUBLIC_URL=https://$${NOAH_APP_DOMAIN}" \
        "LIVEKIT_URL=wss://$${NOAH_LIVEKIT_DOMAIN}" \
        "ROOM_STATE_PUBLIC_URL=wss://$${NOAH_STATE_DOMAIN}" \
        > /etc/default/noah-staging

      mkdir -p /etc/caddy /var/lib/caddy-data /var/lib/caddy-config

      printf '%s\n' \
        "$${NOAH_APP_DOMAIN} {" \
        "reverse_proxy 127.0.0.1:4000" \
        "}" \
        "" \
        "$${NOAH_LIVEKIT_DOMAIN} {" \
        "reverse_proxy 127.0.0.1:7880" \
        "}" \
        "" \
        "$${NOAH_STATE_DOMAIN} {" \
        "reverse_proxy 127.0.0.1:2567" \
        "}" \
        > /etc/caddy/Caddyfile

      cat /etc/caddy/Caddyfile

  - path: /etc/systemd/system/livekit.service
    permissions: "0644"
    content: |
      [Unit]
      Description=LiveKit staging service
      After=network.target

      [Service]
      Type=simple
      Restart=always
      RestartSec=5
      ExecStart=/usr/local/bin/livekit-server --dev --bind 0.0.0.0

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/noah-api.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Noah API staging service
      After=network.target livekit.service
      Requires=livekit.service

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/noah
      EnvironmentFile=/etc/default/noah-staging
      Environment=NODE_ENV=production
      Environment=API_PORT=4000
      Environment=API_CORS_ORIGIN=*
      Environment=LIVEKIT_API_KEY=devkey
      Environment=LIVEKIT_API_SECRET=secret
      Environment=LIVEKIT_ROOM_PREFIX=noah-
      Environment=CONTROL_PLANE_ADMIN_TOKEN=noah-stage-admin
      Environment=STATE_TOKEN_TTL_SECONDS=900
      Environment=MEDIA_TOKEN_TTL_SECONDS=900
      Environment=POSTGRES_URL=postgres://postgres:postgres@127.0.0.1:5432/noah
      ExecStart=/usr/bin/node /opt/noah/apps/api/dist/index.js
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/noah-room-state.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Noah room-state service
      After=network.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/noah
      EnvironmentFile=/etc/default/noah-staging
      Environment=NODE_ENV=production
      Environment=ROOM_STATE_PORT=2567
      ExecStart=/usr/bin/node /opt/noah/apps/room-state/dist/index.js
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -sSL https://get.livekit.io | bash
  - curl -L "https://github.com/caddyserver/caddy/releases/download/v2.11.2/caddy_2.11.2_linux_amd64.deb" -o /tmp/caddy.deb
  - dpkg -i /tmp/caddy.deb || apt-get install -f -y
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - systemctl enable postgresql
  - systemctl restart postgresql
  - sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';" || true
  - sudo -u postgres createdb noah || true
  - /usr/local/bin/noah-write-domains.sh
  - corepack enable
  - rm -rf /opt/noah
  - git clone https://github.com/psilon2000/noah.git /opt/noah
  - bash -lc 'cd /opt/noah && pnpm install --no-frozen-lockfile'
  - bash -lc 'cd /opt/noah && pnpm build'
  - systemctl daemon-reload
  - systemctl enable livekit.service
  - systemctl restart livekit.service
  - systemctl enable noah-room-state.service
  - systemctl restart noah-room-state.service
  - systemctl enable noah-api.service
  - systemctl restart noah-api.service
  - systemctl enable caddy.service
  - bash -lc 'if ! systemctl restart caddy.service; then systemctl status caddy.service --no-pager || true; journalctl -u caddy.service -n 50 --no-pager || true; exit 1; fi'
