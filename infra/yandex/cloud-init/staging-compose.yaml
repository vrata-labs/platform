#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - curl
  - ca-certificates

write_files:
  - path: /usr/local/bin/noah-write-domains.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      NOAH_IP="$(curl -fsH 'Metadata-Flavor: Google' http://169.254.169.254/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip)"
      NOAH_DOMAIN_PREFIX="$(hostname -s)"
      NOAH_APP_DOMAIN="${NOAH_DOMAIN_PREFIX}.${NOAH_IP}.sslip.io"
      NOAH_LIVEKIT_DOMAIN="livekit-${NOAH_DOMAIN_PREFIX}.${NOAH_IP}.sslip.io"
      NOAH_STATE_DOMAIN="state-${NOAH_DOMAIN_PREFIX}.${NOAH_IP}.sslip.io"

      mkdir -p /opt/noah/infra/docker
      export NOAH_IP NOAH_APP_DOMAIN NOAH_STATE_DOMAIN NOAH_LIVEKIT_DOMAIN
      python3 - <<'PY'
      import os
      from pathlib import Path
      ip = os.environ["NOAH_IP"]
      app_domain = os.environ["NOAH_APP_DOMAIN"]
      state_domain = os.environ["NOAH_STATE_DOMAIN"]
      livekit_domain = os.environ["NOAH_LIVEKIT_DOMAIN"]
      lines = [
          "COMPOSE_PROJECT_NAME=noah",
          f"NOAH_APP_BASE_URL=http://{ip}:4000",
          f"NOAH_APP_DOMAIN={app_domain}",
          f"NOAH_STATE_DOMAIN={state_domain}",
          f"NOAH_LIVEKIT_DOMAIN={livekit_domain}",
          f"ROOM_STATE_PUBLIC_URL=ws://{ip}:2567",
          f"LIVEKIT_URL=ws://{ip}:7880",
          "NOAH_HTTP_PORT=80",
          "NOAH_HTTPS_PORT=443",
          "NOAH_API_DIRECT_PORT=4000",
          "NOAH_ROOM_STATE_PORT=2567",
          "NOAH_LIVEKIT_PORT=7880",
          "NOAH_LIVEKIT_UDP_PORT=7881",
          "MINIO_API_PORT=9000",
          "MINIO_CONSOLE_PORT=9001",
          "API_PORT=4000",
          "API_CORS_ORIGIN=*",
          "CONTROL_PLANE_ADMIN_TOKEN=noah-stage-admin",
          "LIVEKIT_API_KEY=devkey",
          "LIVEKIT_API_SECRET=secret",
          "LIVEKIT_ROOM_PREFIX=noah-",
          "STATE_TOKEN_TTL_SECONDS=900",
          "MEDIA_TOKEN_TTL_SECONDS=900",
          "POSTGRES_DB=noah",
          "POSTGRES_USER=postgres",
          "POSTGRES_PASSWORD=postgres",
          "POSTGRES_PORT=5432",
          "POSTGRES_URL=postgres://postgres:postgres@postgres:5432/noah",
          "MINIO_ROOT_USER=noahminio",
          "MINIO_ROOT_PASSWORD=noahminio123",
          "MINIO_BUCKET=noah-scene-bundles",
          f"MINIO_PUBLIC_BASE_URL=http://{ip}:9000",
          "MINIO_SCENE_PREFIX=scenes/",
          "CADDY_CONFIG_FILE=./Caddyfile.staging"
      ]
      content = "\n".join(lines) + "\n"
      Path("/opt/noah/infra/docker/.env.staging").write_text(content)
      PY
  - path: /usr/local/bin/noah-install-metadata-ssh.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      SSH_KEYS="$(curl -fsH 'Metadata-Flavor: Google' http://169.254.169.254/computeMetadata/v1/instance/attributes/ssh-keys || true)"
      [ -n "$SSH_KEYS" ] || exit 0

      while IFS= read -r entry; do
        [ -n "$entry" ] || continue
        user_name="${entry%%:*}"
        public_key="${entry#*:}"
        if ! id "$user_name" >/dev/null 2>&1; then
          useradd -m -s /bin/bash "$user_name"
        fi
        install -d -m 700 -o "$user_name" -g "$user_name" "/home/$user_name/.ssh"
        printf '%s\n' "$public_key" > "/home/$user_name/.ssh/authorized_keys"
        chown "$user_name:$user_name" "/home/$user_name/.ssh/authorized_keys"
        chmod 600 "/home/$user_name/.ssh/authorized_keys"
      done <<< "$SSH_KEYS"

runcmd:
  - /usr/local/bin/noah-install-metadata-ssh.sh
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl restart docker
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 443/udp
  - ufw allow 7880/tcp
  - ufw allow 7881/udp
  - ufw allow 2567/tcp
  - ufw allow 9000/tcp
  - ufw allow 9001/tcp
  - rm -rf /opt/noah
  - git clone --branch deploy/scene-bundles-stage-20260328 --single-branch https://github.com/psilon2000/noah.git /opt/noah
  - /usr/local/bin/noah-write-domains.sh
  - bash -lc 'cd /opt/noah && docker compose --env-file infra/docker/.env.staging -f infra/docker/compose.staging.yml build'
  - bash -lc 'cd /opt/noah && docker compose --env-file infra/docker/.env.staging -f infra/docker/compose.staging.yml up -d'
