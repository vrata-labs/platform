#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - curl
  - postgresql

users:
  - default
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  psilon2000@mail.ru

write_files:
  - path: /usr/local/bin/vrata-write-domains.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      VRATA_IP="$(curl -fsH 'Metadata-Flavor: Google' http://169.254.169.254/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip)"
      VRATA_DOMAIN_PREFIX="$(hostname -s)"
      VRATA_APP_DOMAIN="$${VRATA_DOMAIN_PREFIX}.$${VRATA_IP}.sslip.io"
      VRATA_LIVEKIT_DOMAIN="livekit-$${VRATA_DOMAIN_PREFIX}.$${VRATA_IP}.sslip.io"
      VRATA_STATE_DOMAIN="state-$${VRATA_DOMAIN_PREFIX}.$${VRATA_IP}.sslip.io"

      printf '%s\n' \
        "VRATA_APP_DOMAIN=$${VRATA_APP_DOMAIN}" \
        "VRATA_LIVEKIT_DOMAIN=$${VRATA_LIVEKIT_DOMAIN}" \
        "VRATA_STATE_DOMAIN=$${VRATA_STATE_DOMAIN}" \
        "RUNTIME_BASE_URL=https://$${VRATA_APP_DOMAIN}" \
        "API_PUBLIC_URL=https://$${VRATA_APP_DOMAIN}" \
        "LIVEKIT_URL=wss://$${VRATA_LIVEKIT_DOMAIN}" \
        "ROOM_STATE_PUBLIC_URL=wss://$${VRATA_STATE_DOMAIN}" \
        > /etc/default/vrata-staging

      mkdir -p /etc/caddy /var/lib/caddy-data /var/lib/caddy-config

      printf '%s\n' \
        "$${VRATA_APP_DOMAIN} {" \
        "reverse_proxy 127.0.0.1:4000" \
        "}" \
        "" \
        "$${VRATA_LIVEKIT_DOMAIN} {" \
        "reverse_proxy 127.0.0.1:7880" \
        "}" \
        "" \
        "$${VRATA_STATE_DOMAIN} {" \
        "reverse_proxy 127.0.0.1:2567" \
        "}" \
        > /etc/caddy/Caddyfile

  - path: /etc/systemd/system/livekit.service
    permissions: "0644"
    content: |
      [Unit]
      Description=LiveKit staging service
      After=network.target

      [Service]
      Type=simple
      Restart=always
      RestartSec=5
      ExecStart=/usr/local/bin/livekit-server --dev --bind 0.0.0.0

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/vrata-api.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Vrata API staging service
      After=network.target livekit.service
      Requires=livekit.service

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/vrata
      EnvironmentFile=/etc/default/vrata-staging
      Environment=NODE_ENV=production
      Environment=API_PORT=4000
      Environment=API_CORS_ORIGIN=*
      Environment=LIVEKIT_API_KEY=devkey
      Environment=LIVEKIT_API_SECRET=secret
      Environment=LIVEKIT_ROOM_PREFIX=vrata-
      Environment=CONTROL_PLANE_ADMIN_TOKEN=vrata-stage-admin
      Environment=STATE_TOKEN_TTL_SECONDS=900
      Environment=MEDIA_TOKEN_TTL_SECONDS=900
      Environment=POSTGRES_URL=postgres://postgres:postgres@127.0.0.1:5432/vrata
      ExecStart=/usr/bin/node /opt/vrata/apps/api/dist/index.js
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/vrata-room-state.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Vrata room-state service
      After=network.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/vrata
      EnvironmentFile=/etc/default/vrata-staging
      Environment=NODE_ENV=production
      Environment=ROOM_STATE_PORT=2567
      ExecStart=/usr/bin/node /opt/vrata/apps/room-state/dist/index.js
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -sSL https://get.livekit.io | bash
  - curl -L "https://github.com/caddyserver/caddy/releases/download/v2.11.2/caddy_2.11.2_linux_amd64.deb" -o /tmp/caddy.deb
  - dpkg -i /tmp/caddy.deb || apt-get install -f -y
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - systemctl enable postgresql
  - systemctl restart postgresql
  - sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';" || true
  - sudo -u postgres createdb vrata || true
  - /usr/local/bin/vrata-write-domains.sh
  - corepack enable
  - rm -rf /opt/vrata
  - git clone --branch deploy/scene-bundles-stage-20260328 --single-branch https://github.com/psilon2000/vrata.git /opt/vrata
  - bash -lc 'cd /opt/vrata && pnpm install --no-frozen-lockfile'
  - bash -lc 'cd /opt/vrata && pnpm build'
  - systemctl daemon-reload
  - systemctl enable livekit.service
  - systemctl restart livekit.service
  - systemctl enable vrata-room-state.service
  - systemctl restart vrata-room-state.service
  - systemctl enable vrata-api.service
  - systemctl restart vrata-api.service
  - systemctl enable caddy.service
  - bash -lc 'if ! systemctl restart caddy.service; then systemctl status caddy.service --no-pager || true; journalctl -u caddy.service -n 50 --no-pager || true; exit 1; fi'
