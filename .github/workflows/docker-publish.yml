name: Docker Publish

on:
  push:
    branches:
      - main
      - deploy/scene-bundles-stage-20260328
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: cr.yandex
  API_IMAGE_NAME: noah-api
  ROOM_STATE_IMAGE_NAME: noah-room-state

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        env:
          YCR_REGISTRY_ID: ${{ secrets.YCR_REGISTRY_ID }}
        run: |
          test -n "$YCR_REGISTRY_ID"
          SHA_TAG="${GITHUB_SHA}"
          BRANCH_SLUG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/_' '--' | tr -cd 'a-z0-9-.')"
          API_IMAGE="${REGISTRY}/${YCR_REGISTRY_ID}/${API_IMAGE_NAME}"
          ROOM_STATE_IMAGE="${REGISTRY}/${YCR_REGISTRY_ID}/${ROOM_STATE_IMAGE_NAME}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "room_state_image=${ROOM_STATE_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.YCR_USERNAME }}
          password: ${{ secrets.YCR_PASSWORD }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.branch_slug }}
            ${{ steps.meta.outputs.api_image }}:staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push room-state image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/room-state/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.room_state_image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.room_state_image }}:${{ steps.meta.outputs.branch_slug }}
            ${{ steps.meta.outputs.room_state_image }}:staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Print published image refs
        run: |
          echo "API image SHA: ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.sha_tag }}"
          echo "API image alias: ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.branch_slug }}"
          echo "API image staging alias: ${{ steps.meta.outputs.api_image }}:staging"
          echo "Room-state image SHA: ${{ steps.meta.outputs.room_state_image }}:${{ steps.meta.outputs.sha_tag }}"
          echo "Room-state image alias: ${{ steps.meta.outputs.room_state_image }}:${{ steps.meta.outputs.branch_slug }}"
          echo "Room-state image staging alias: ${{ steps.meta.outputs.room_state_image }}:staging"
